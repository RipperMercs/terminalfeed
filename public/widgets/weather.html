<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Weather Widget | TerminalFeed</title>
<meta name="description" content="Embeddable live weather widget. Current temperature, conditions, wind, with animated day/night icons. Lat/lon configurable, dark/light/terminal themes. Free to embed.">
<link rel="canonical" href="https://terminalfeed.io/widgets/weather">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'SF Mono','JetBrains Mono','Fira Code',Consolas,monospace}
body{transition:background 0.3s}
body.theme-dark{background:#0A0A0C;color:#D4D2CB}
body.theme-light{background:#FFFFFF;color:#1A1A1E}
body.theme-terminal{background:#000000;color:#5DCAA5}
body.theme-dark.is-day{background:linear-gradient(135deg,#0A0A0C 0%,#0D1A1F 100%)}
body.theme-dark.is-night{background:linear-gradient(135deg,#0A0A0C 0%,#0D0A1F 100%)}

.widget{position:relative;width:100%;height:100%;padding:14px 16px;display:flex;flex-direction:column;justify-content:center}
.label-row{position:absolute;top:10px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:center;font-size:9px;letter-spacing:1.8px;opacity:0.55;text-transform:uppercase}
.live-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#60A5FA;animation:pulse 2s ease infinite;margin-right:6px;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

.main{display:flex;align-items:center;gap:18px}
.icon-wrap{flex:0 0 auto;width:64px;height:64px;display:flex;align-items:center;justify-content:center;position:relative}
.icon-wrap svg{width:100%;height:100%;display:block}

/* Sun */
.sun{fill:#FACC15}
.sun-rays line{stroke:#FACC15;stroke-width:2;stroke-linecap:round;animation:rayPulse 3s ease infinite}
@keyframes rayPulse{0%,100%{opacity:1}50%{opacity:0.55}}
/* Moon */
.moon{fill:#E5E7EB}
body.theme-light .moon{fill:#52525B}
/* Cloud */
.cloud-shape{fill:#94A3B8}
body.theme-light .cloud-shape{fill:#64748B}
/* Rain */
.rain-drop{fill:#60A5FA;animation:rainFall 1.4s ease-in infinite}
.rain-drop:nth-child(2){animation-delay:0.3s}
.rain-drop:nth-child(3){animation-delay:0.6s}
@keyframes rainFall{0%{transform:translateY(0);opacity:1}80%{opacity:1}100%{transform:translateY(8px);opacity:0}}
/* Snow */
.snow-flake{fill:#E5E7EB;animation:snowFall 2.4s ease-in infinite}
.snow-flake:nth-child(2){animation-delay:0.6s}
.snow-flake:nth-child(3){animation-delay:1.2s}
@keyframes snowFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(10px) rotate(180deg);opacity:0}}
/* Lightning */
.lightning{fill:#FACC15;animation:flash 2s ease infinite}
@keyframes flash{0%,30%,100%{opacity:0.3}5%,15%{opacity:1}}
/* Fog */
.fog-line{stroke:#94A3B8;stroke-width:3;stroke-linecap:round;animation:fogDrift 3s ease infinite}
.fog-line:nth-child(2){animation-delay:0.5s}
@keyframes fogDrift{0%,100%{opacity:0.5;transform:translateX(0)}50%{opacity:0.9;transform:translateX(2px)}}

.info{flex:1;min-width:0}
.temp-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.temp{font-size:32px;font-weight:600;letter-spacing:-1px;line-height:1}
body.theme-dark .temp{color:#F0EDE6}
body.theme-light .temp{color:#1A1A1E}
.unit{font-size:13px;opacity:0.55;font-weight:400}
.condition{font-size:12px;margin-top:4px;opacity:0.85;line-height:1.3}
.location{font-size:10px;opacity:0.5;letter-spacing:0.3px;margin-top:2px}

.bottom-row{display:flex;gap:14px;margin-top:10px;font-size:10px;opacity:0.6;flex-wrap:wrap}
.stat{display:flex;gap:4px;align-items:center}
.stat-label{opacity:0.7}
.stat-value{font-weight:500}
body.theme-dark .stat-value{color:#F0EDE6}
body.theme-light .stat-value{color:#1A1A1E}

.footer{position:absolute;bottom:5px;right:8px;font-size:8px;opacity:0.3;letter-spacing:0.5px}
.footer a{color:inherit;text-decoration:none}

body.size-sm .label-row{font-size:8px;top:6px}
body.size-sm .icon-wrap{width:44px;height:44px}
body.size-sm .temp{font-size:22px}
body.size-sm .condition{font-size:10px}
body.size-sm .location{font-size:9px}
body.size-sm .bottom-row{font-size:9px;gap:8px;margin-top:6px}

body.size-lg .icon-wrap{width:84px;height:84px}
body.size-lg .temp{font-size:42px}
body.size-lg .condition{font-size:14px}
body.size-lg .bottom-row{font-size:11px}

@media (prefers-reduced-motion: reduce){.live-dot,.sun-rays line,.rain-drop,.snow-flake,.lightning,.fog-line{animation:none}}
</style>
</head>
<body>
<div class="widget">
  <div class="label-row">
    <span><span class="live-dot"></span>WEATHER</span>
    <span id="updated">--</span>
  </div>
  <div class="main">
    <div class="icon-wrap" id="icon-wrap"></div>
    <div class="info">
      <div class="temp-row">
        <span class="temp" id="temp">--</span>
        <span class="unit" id="unit">°C</span>
      </div>
      <div class="condition" id="condition">loading...</div>
      <div class="location" id="location">--</div>
    </div>
  </div>
  <div class="bottom-row">
    <span class="stat"><span class="stat-label">Wind</span><span class="stat-value" id="wind">--</span></span>
    <span class="stat"><span class="stat-label">Dir</span><span class="stat-value" id="dir">--</span></span>
  </div>
  <div class="footer"><a href="https://terminalfeed.io?utm_source=widget&amp;utm_medium=weather" target="_blank" rel="noopener">terminalfeed.io</a></div>
</div>
<script>
(function(){
  var qs=new URLSearchParams(location.search);
  var theme=qs.get('theme')||'dark';
  var size=qs.get('size')||'md';
  if(['dark','light','terminal'].indexOf(theme)===-1)theme='dark';
  if(['sm','md','lg'].indexOf(size)===-1)size='md';
  // Default to Los Angeles per TerminalFeed convention; query params override.
  var lat=parseFloat(qs.get('lat')||'34.05');
  var lon=parseFloat(qs.get('lon')||'-118.24');
  var locName=qs.get('name')||'';
  var unit=(qs.get('unit')||'c').toLowerCase()==='f'?'f':'c';

  document.body.className='theme-'+theme+' size-'+size;

  // WMO weather codes -> {label, icon}
  function codeInfo(code,isDay){
    if(code===0)return{label:'Clear sky',icon:isDay?'sun':'moon'};
    if(code===1)return{label:'Mainly clear',icon:isDay?'sun':'moon'};
    if(code===2)return{label:'Partly cloudy',icon:'cloud'};
    if(code===3)return{label:'Overcast',icon:'cloud'};
    if(code===45||code===48)return{label:'Fog',icon:'fog'};
    if(code>=51&&code<=57)return{label:'Drizzle',icon:'rain'};
    if(code>=61&&code<=67)return{label:'Rain',icon:'rain'};
    if(code>=71&&code<=77)return{label:'Snow',icon:'snow'};
    if(code>=80&&code<=82)return{label:'Rain showers',icon:'rain'};
    if(code>=85&&code<=86)return{label:'Snow showers',icon:'snow'};
    if(code>=95)return{label:'Thunderstorm',icon:'lightning'};
    return{label:'Unknown',icon:'cloud'};
  }

  var iconWrap=document.getElementById('icon-wrap');
  function setIcon(kind){
    var svg='';
    if(kind==='sun'){
      svg='<svg viewBox="0 0 64 64"><circle class="sun" cx="32" cy="32" r="14"/>'+
          '<g class="sun-rays"><line x1="32" y1="6" x2="32" y2="14"/><line x1="32" y1="50" x2="32" y2="58"/>'+
          '<line x1="6" y1="32" x2="14" y2="32"/><line x1="50" y1="32" x2="58" y2="32"/>'+
          '<line x1="14" y1="14" x2="20" y2="20"/><line x1="44" y1="44" x2="50" y2="50"/>'+
          '<line x1="50" y1="14" x2="44" y2="20"/><line x1="14" y1="50" x2="20" y2="44"/></g></svg>';
    } else if(kind==='moon'){
      svg='<svg viewBox="0 0 64 64"><path class="moon" d="M40 12 a 22 22 0 1 0 16 38 a 18 18 0 1 1 -16 -38 z"/></svg>';
    } else if(kind==='cloud'){
      svg='<svg viewBox="0 0 64 64"><path class="cloud-shape" d="M16 42 a 10 10 0 0 1 0 -20 a 14 14 0 0 1 28 -2 a 9 9 0 0 1 6 22 z"/></svg>';
    } else if(kind==='rain'){
      svg='<svg viewBox="0 0 64 64"><path class="cloud-shape" d="M14 36 a 9 9 0 0 1 0 -18 a 13 13 0 0 1 26 -2 a 8 8 0 0 1 5 20 z"/>'+
          '<circle class="rain-drop" cx="22" cy="46" r="2"/><circle class="rain-drop" cx="32" cy="46" r="2"/><circle class="rain-drop" cx="42" cy="46" r="2"/></svg>';
    } else if(kind==='snow'){
      svg='<svg viewBox="0 0 64 64"><path class="cloud-shape" d="M14 36 a 9 9 0 0 1 0 -18 a 13 13 0 0 1 26 -2 a 8 8 0 0 1 5 20 z"/>'+
          '<text class="snow-flake" x="22" y="50" font-size="12">*</text>'+
          '<text class="snow-flake" x="32" y="50" font-size="12">*</text>'+
          '<text class="snow-flake" x="42" y="50" font-size="12">*</text></svg>';
    } else if(kind==='lightning'){
      svg='<svg viewBox="0 0 64 64"><path class="cloud-shape" d="M14 36 a 9 9 0 0 1 0 -18 a 13 13 0 0 1 26 -2 a 8 8 0 0 1 5 20 z"/>'+
          '<polygon class="lightning" points="32,40 28,52 32,52 28,60 40,46 34,46 38,40"/></svg>';
    } else if(kind==='fog'){
      svg='<svg viewBox="0 0 64 64"><path class="cloud-shape" d="M14 30 a 9 9 0 0 1 0 -18 a 13 13 0 0 1 26 -2 a 8 8 0 0 1 5 20 z"/>'+
          '<line class="fog-line" x1="10" y1="44" x2="54" y2="44"/>'+
          '<line class="fog-line" x1="14" y1="52" x2="50" y2="52"/></svg>';
    }
    iconWrap.innerHTML=svg;
  }

  function compass(deg){
    var dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    return dirs[Math.round(((deg%360)/22.5))%16];
  }

  function load(){
    fetch('https://terminalfeed.io/api/weather?lat='+lat+'&lon='+lon).then(function(r){return r.json()}).then(function(j){
      var data=j.data||j;
      var cw=data.current_weather||data.current;
      if(!cw)return;
      var tempC=cw.temperature;
      var windKmh=cw.windspeed||cw.wind_speed_10m||0;
      var dirDeg=cw.winddirection||cw.wind_direction_10m||0;
      var code=cw.weathercode||cw.weather_code||0;
      var isDay=cw.is_day===undefined?true:!!cw.is_day;
      var info=codeInfo(code,isDay);

      document.body.classList.remove('is-day','is-night');
      document.body.classList.add(isDay?'is-day':'is-night');

      var displayTemp,displayUnit;
      if(unit==='f'){displayTemp=Math.round(tempC*9/5+32);displayUnit='°F';}
      else{displayTemp=Math.round(tempC);displayUnit='°C';}

      document.getElementById('temp').textContent=displayTemp;
      document.getElementById('unit').textContent=displayUnit;
      document.getElementById('condition').textContent=info.label;
      var locText=locName||(lat.toFixed(2)+', '+lon.toFixed(2));
      if(data.timezone)locText+=' · '+data.timezone.replace(/_/g,' ').split('/').pop();
      document.getElementById('location').textContent=locText;
      document.getElementById('wind').textContent=Math.round(windKmh)+' km/h';
      document.getElementById('dir').textContent=compass(dirDeg);
      setIcon(info.icon);

      var d=new Date();
      document.getElementById('updated').textContent=d.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit'});
    }).catch(function(){
      document.getElementById('condition').textContent='Unable to load';
    });
  }

  var timer=null;
  function start(){if(timer)return;timer=setInterval(load,600000)}  // 10min
  function stop(){if(timer){clearInterval(timer);timer=null;}}
  document.addEventListener('visibilitychange',function(){
    if(document.hidden)stop();else{load();start();}
  });

  load();start();
})();
</script>
</body>
</html>
