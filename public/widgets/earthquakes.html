<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Earthquake Ticker Widget | TerminalFeed</title>
<meta name="description" content="Embeddable live earthquake ticker. Latest seismic events from USGS with magnitude, location, depth, and time-since. Updates every 60 seconds. Free to embed.">
<link rel="canonical" href="https://terminalfeed.io/widgets/earthquakes">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'SF Mono','JetBrains Mono','Fira Code',Consolas,monospace}
body{transition:background 0.3s}
body.theme-dark{background:#0A0A0C;color:#D4D2CB}
body.theme-light{background:#FFFFFF;color:#1A1A1E}
body.theme-terminal{background:#000000;color:#5DCAA5}

.widget{position:relative;width:100%;height:100%;padding:10px 14px;display:flex;flex-direction:column}
.label-row{display:flex;justify-content:space-between;align-items:center;font-size:9px;letter-spacing:1.8px;opacity:0.55;text-transform:uppercase;margin-bottom:6px}
.label-row .live{display:flex;align-items:center;gap:6px}
.live-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#F87171;animation:seismic 1.6s ease infinite}
@keyframes seismic{0%,100%{opacity:1;transform:scale(1)}30%{opacity:0.3;transform:scale(1.3)}60%{opacity:0.7;transform:scale(0.95)}}

.list{flex:1;display:flex;flex-direction:column;gap:1px;min-height:0;overflow:hidden}
.row{display:flex;align-items:center;gap:10px;padding:5px 6px;border-radius:2px;font-size:11px;transition:background 0.15s}
body.theme-dark .row:hover{background:#111114}
body.theme-light .row:hover{background:#F5F5F5}

.mag{flex:0 0 auto;font-size:14px;font-weight:600;letter-spacing:-0.3px;line-height:1;width:36px;text-align:center;padding:3px 4px;border-radius:3px}
.mag.minor{color:#FACC15;background:#FACC1518}
.mag.moderate{color:#F87171;background:#F8717118}
.mag.major{color:#DC2626;background:#DC262625;font-weight:700}
body.theme-light .mag.minor{color:#CA8A04;background:#CA8A0418}

.info{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.place{font-size:11px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.meta{font-size:9px;opacity:0.6;letter-spacing:0.3px;display:flex;gap:8px}
.meta-tag{display:inline-flex;align-items:center;gap:3px}
.depth{opacity:0.7}

.empty{display:flex;align-items:center;justify-content:center;flex:1;font-size:11px;opacity:0.5}

.footer{display:flex;justify-content:space-between;align-items:center;padding-top:5px;font-size:8px;opacity:0.4;letter-spacing:0.5px;border-top:1px solid;margin-top:5px}
body.theme-dark .footer{border-color:#1E1E24}
body.theme-light .footer{border-color:#E5E5E5}
body.theme-terminal .footer{border-color:#1E3A2A}
.footer a{color:inherit;text-decoration:none}

body.size-sm .mag{font-size:12px;width:30px}
body.size-sm .place{font-size:10px}
body.size-sm .meta{font-size:8px}
body.size-sm .row{padding:3px 4px}

body.size-lg .mag{font-size:18px;width:44px;padding:5px 6px}
body.size-lg .place{font-size:13px}
body.size-lg .meta{font-size:10px}
body.size-lg .row{padding:7px 8px}

@media (prefers-reduced-motion: reduce){.live-dot{animation:none}}
</style>
</head>
<body>
<div class="widget">
  <div class="label-row">
    <span class="live"><span class="live-dot"></span>RECENT EARTHQUAKES · USGS</span>
    <span id="count">--</span>
  </div>
  <div class="list" id="list"><div class="empty">loading...</div></div>
  <div class="footer">
    <span id="updated">--</span>
    <a href="https://terminalfeed.io?utm_source=widget&amp;utm_medium=earthquakes" target="_blank" rel="noopener">terminalfeed.io</a>
  </div>
</div>
<script>
(function(){
  var qs=new URLSearchParams(location.search);
  var theme=qs.get('theme')||'dark';
  var size=qs.get('size')||'md';
  if(['dark','light','terminal'].indexOf(theme)===-1)theme='dark';
  if(['sm','md','lg'].indexOf(size)===-1)size='md';
  document.body.className='theme-'+theme+' size-'+size;

  var listEl=document.getElementById('list');
  var countEl=document.getElementById('count');
  var updatedEl=document.getElementById('updated');

  function magClass(m){
    if(m>=6)return'major';
    if(m>=4.5)return'moderate';
    return'minor';
  }

  function timeAgo(ms){
    var s=Math.max(0,Math.floor((Date.now()-ms)/1000));
    if(s<60)return s+'s ago';
    if(s<3600)return Math.floor(s/60)+'m ago';
    if(s<86400)return Math.floor(s/3600)+'h ago';
    return Math.floor(s/86400)+'d ago';
  }

  function render(events){
    if(!events||events.length===0){
      listEl.innerHTML='<div class="empty">No recent events</div>';
      countEl.textContent='0';
      return;
    }
    listEl.innerHTML='';
    var max=size==='sm'?4:size==='lg'?8:6;
    events.slice(0,max).forEach(function(e){
      var row=document.createElement('div');
      row.className='row';
      var mag=parseFloat(e.magnitude||0);
      var d=parseFloat(e.depth_km||0);
      row.innerHTML='<div class="mag '+magClass(mag)+'">'+mag.toFixed(1)+'</div>'+
                    '<div class="info">'+
                      '<div class="place" title="'+(e.place||'').replace(/"/g,'&quot;')+'">'+(e.place||'Unknown location')+'</div>'+
                      '<div class="meta">'+
                        '<span class="meta-tag">'+timeAgo(e.time||Date.now())+'</span>'+
                        '<span class="meta-tag depth">'+(d?d.toFixed(0)+' km':'')+'</span>'+
                      '</div>'+
                    '</div>';
      listEl.appendChild(row);
    });
    countEl.textContent=events.length+' total';
    var dt=new Date();
    updatedEl.textContent='Updated '+dt.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit'});
  }

  function load(){
    fetch('https://terminalfeed.io/api/earthquake').then(function(r){return r.json()}).then(function(j){
      var data=(j&&j.data)||[];
      data.sort(function(a,b){return (b.time||0)-(a.time||0)});
      render(data);
    }).catch(function(){
      listEl.innerHTML='<div class="empty">Unable to load</div>';
    });
  }

  var timer=null;
  function start(){if(timer)return;timer=setInterval(load,60000)}  // 1min
  function stop(){if(timer){clearInterval(timer);timer=null;}}
  document.addEventListener('visibilitychange',function(){
    if(document.hidden)stop();else{load();start();}
  });

  load();start();
})();
</script>
</body>
</html>
