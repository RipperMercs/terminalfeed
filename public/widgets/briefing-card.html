<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Briefing Card Widget | TerminalFeed</title>
<meta name="description" content="Embeddable crypto briefing card. BTC price, Fear &amp; Greed index, top mover, and a one-line market summary in a compact terminal-style panel. Updates live, dark/light/terminal themes.">
<link rel="canonical" href="https://terminalfeed.io/widgets/briefing-card">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'SF Mono','JetBrains Mono','Fira Code',Consolas,monospace}
body{transition:background 0.3s}
body.theme-dark{background:#0A0A0C;color:#D4D2CB}
body.theme-light{background:#FFFFFF;color:#1A1A1E}
body.theme-terminal{background:#000000;color:#5DCAA5}

.widget{position:relative;width:100%;height:100%;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.label-row{display:flex;justify-content:space-between;align-items:center;font-size:9px;letter-spacing:1.8px;opacity:0.55;text-transform:uppercase}
.live{display:flex;align-items:center;gap:6px}
.live-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#5DCAA5;animation:pulse 2s ease infinite;box-shadow:0 0 6px #5DCAA560}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.85)}}

.row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:5px 0}
.row+.row{border-top:1px solid;}
body.theme-dark .row+.row{border-top-color:#1A1A22}
body.theme-light .row+.row{border-top-color:#E5E5E5}
body.theme-terminal .row+.row{border-top-color:#1E3A2A}

.metric-label{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:0.5px;opacity:0.65;text-transform:uppercase}
.metric-icon{display:inline-block;width:14px;height:14px;flex-shrink:0}
.metric-icon svg{width:100%;height:100%;display:block}

.metric-value{display:flex;flex-direction:column;align-items:flex-end;gap:1px;text-align:right}
.value{font-size:16px;font-weight:600;line-height:1;letter-spacing:-0.3px}
body.theme-dark .value{color:#F0EDE6}
body.theme-light .value{color:#1A1A1E}
body.theme-terminal .value{color:#5DCAA5}
.aux{font-size:10px;line-height:1.2;opacity:0.7;font-weight:500}
.aux.up{color:#4ADE80;opacity:1}
.aux.down{color:#F87171;opacity:1}
body.theme-light .aux.up{color:#16A34A}
body.theme-light .aux.down{color:#DC2626}

.fg-mini{display:inline-flex;align-items:center;gap:6px}
.fg-bar{width:42px;height:4px;border-radius:2px;background:linear-gradient(to right,#DC2626,#F87171,#FACC15,#4ADE80,#16A34A);position:relative}
.fg-marker{position:absolute;top:-3px;width:2px;height:10px;border-radius:1px;background:#F0EDE6;transition:left 0.6s ease}
body.theme-light .fg-marker{background:#1A1A1E}

.summary-line{font-size:10px;line-height:1.5;opacity:0.75;padding-top:4px;font-style:italic;border-top:1px solid;padding-bottom:0}
body.theme-dark .summary-line{border-top-color:#1A1A22}
body.theme-light .summary-line{border-top-color:#E5E5E5}
body.theme-terminal .summary-line{border-top-color:#1E3A2A}

.footer{position:absolute;bottom:5px;right:8px;font-size:8px;opacity:0.3;letter-spacing:0.5px}
.footer a{color:inherit;text-decoration:none}

body.size-sm .widget{padding:8px 12px;gap:5px}
body.size-sm .label-row{font-size:8px}
body.size-sm .metric-label{font-size:9px}
body.size-sm .value{font-size:13px}
body.size-sm .aux{font-size:9px}
body.size-sm .summary-line{display:none}
body.size-sm .row{padding:3px 0}

body.size-lg .widget{padding:16px 20px;gap:10px}
body.size-lg .metric-label{font-size:12px}
body.size-lg .value{font-size:20px}
body.size-lg .aux{font-size:11px}
body.size-lg .summary-line{font-size:11px}
body.size-lg .row{padding:6px 0}

@media (prefers-reduced-motion: reduce){.live-dot{animation:none}.fg-marker{transition:none}}
</style>
</head>
<body>
<div class="widget">
  <div class="label-row">
    <span class="live"><span class="live-dot"></span>CRYPTO BRIEFING</span>
    <span id="updated">--</span>
  </div>

  <div class="row">
    <div class="metric-label">
      <span class="metric-icon"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" fill="#F9CB42"/><text x="8" y="11" text-anchor="middle" fill="#0A0A0C" font-size="9" font-weight="700" font-family="serif">₿</text></svg></span>
      BTC
    </div>
    <div class="metric-value">
      <span class="value" id="btc-price">--</span>
      <span class="aux" id="btc-change">--</span>
    </div>
  </div>

  <div class="row">
    <div class="metric-label">
      <span class="metric-icon"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="1.2"/><line x1="3.5" y1="8" x2="12.5" y2="8" stroke="currentColor" stroke-width="1"/></svg></span>
      Fear &amp; Greed
    </div>
    <div class="metric-value">
      <span class="fg-mini">
        <span class="value" id="fg-value">--</span>
        <span class="fg-bar"><span class="fg-marker" id="fg-marker" style="left:50%"></span></span>
      </span>
      <span class="aux" id="fg-label">--</span>
    </div>
  </div>

  <div class="row">
    <div class="metric-label">
      <span class="metric-icon"><svg viewBox="0 0 16 16"><polyline points="2,11 6,7 9,9 14,3" fill="none" stroke="#4ADE80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><polyline points="14,3 14,7 10,5" fill="none" stroke="#4ADE80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      Top Mover (24h)
    </div>
    <div class="metric-value">
      <span class="value" id="top-symbol">--</span>
      <span class="aux up" id="top-change">--</span>
    </div>
  </div>

  <div class="summary-line" id="summary">Loading market state...</div>

  <div class="footer"><a href="https://terminalfeed.io?utm_source=widget&amp;utm_medium=briefing-card" target="_blank" rel="noopener">terminalfeed.io</a></div>
</div>
<script>
(function(){
  var qs=new URLSearchParams(location.search);
  var theme=qs.get('theme')||'dark';
  var size=qs.get('size')||'md';
  if(['dark','light','terminal'].indexOf(theme)===-1)theme='dark';
  if(['sm','md','lg'].indexOf(size)===-1)size='md';
  document.body.className='theme-'+theme+' size-'+size;

  function fmtPrice(n){
    if(n>=10000)return '$'+Math.round(n).toLocaleString('en-US');
    if(n>=1)return '$'+n.toFixed(2);
    return '$'+n.toFixed(6);
  }

  function fgClassify(v){
    if(v<=24)return{label:'Extreme Fear',color:'#DC2626'};
    if(v<=44)return{label:'Fear',color:'#F87171'};
    if(v<=55)return{label:'Neutral',color:'#FACC15'};
    if(v<=74)return{label:'Greed',color:'#4ADE80'};
    return{label:'Extreme Greed',color:'#16A34A'};
  }

  function buildSummary(btc,btcCh,fg,topSym,topCh){
    var fgLabel=fg!==null?fgClassify(fg).label.toLowerCase():'unknown';
    var btcDir=btcCh>=0?'up':'down';
    return 'BTC '+btcDir+' '+Math.abs(btcCh).toFixed(2)+'% · sentiment '+fgLabel+(topSym?' · '+topSym.toUpperCase()+' leading at +'+topCh.toFixed(1)+'%':'');
  }

  var state={btc:null,btcCh:null,fg:null,topSym:null,topCh:null};

  function paint(){
    if(state.btc!==null){
      document.getElementById('btc-price').textContent=fmtPrice(state.btc);
    }
    if(state.btcCh!==null){
      var v=state.btcCh;
      var el=document.getElementById('btc-change');
      el.textContent=(v>=0?'+':'')+v.toFixed(2)+'% (24h)';
      el.className='aux '+(v>=0?'up':'down');
    }
    if(state.fg!==null){
      var info=fgClassify(state.fg);
      document.getElementById('fg-value').textContent=state.fg;
      document.getElementById('fg-value').style.color=info.color;
      document.getElementById('fg-label').textContent=info.label;
      document.getElementById('fg-label').style.color=info.color;
      document.getElementById('fg-label').style.opacity='1';
      var marker=document.getElementById('fg-marker');
      marker.style.left=Math.max(0,Math.min(100,state.fg))+'%';
    }
    if(state.topSym){
      document.getElementById('top-symbol').textContent=state.topSym.toUpperCase();
      var el=document.getElementById('top-change');
      el.textContent=(state.topCh>=0?'+':'')+state.topCh.toFixed(2)+'% (24h)';
      el.className='aux '+(state.topCh>=0?'up':'down');
    }
    if(state.btc!==null && state.btcCh!==null && state.fg!==null){
      document.getElementById('summary').textContent=buildSummary(state.btc,state.btcCh,state.fg,state.topSym,state.topCh);
    }
    var d=new Date();
    document.getElementById('updated').textContent=d.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit'});
  }

  function loadBtc(){
    return fetch('https://terminalfeed.io/api/btc-price').then(function(r){return r.json()}).then(function(j){
      var d=j.data||j;
      if(d.price_usd||d.price)state.btc=d.price_usd||d.price;
      if(d.change_24h_percent!==undefined)state.btcCh=parseFloat(d.change_24h_percent);
    });
  }

  function loadFg(){
    return fetch('https://terminalfeed.io/api/fear-greed').then(function(r){return r.json()}).then(function(j){
      var d=j.data||j;
      var v=d.value!==undefined?d.value:(d.fear_greed&&d.fear_greed.value);
      if(v!==undefined && v!==null)state.fg=parseInt(v,10);
    });
  }

  function loadMover(){
    return fetch('https://terminalfeed.io/api/coingecko/markets').then(function(r){return r.json()}).then(function(j){
      var data=(j&&j.data)||[];
      // Top mover by absolute % change, excluding stablecoins
      var STABLES={usdt:1,usdc:1,dai:1,usds:1,fdusd:1,tusd:1,usde:1,pyusd:1,gusd:1,busd:1};
      var filtered=data.filter(function(c){return !STABLES[(c.symbol||'').toLowerCase()] && (c.current_price||0)>0});
      filtered.sort(function(a,b){return Math.abs(b.price_change_percentage_24h||0)-Math.abs(a.price_change_percentage_24h||0)});
      if(filtered[0]){
        state.topSym=filtered[0].symbol;
        state.topCh=parseFloat(filtered[0].price_change_percentage_24h||0);
      }
    });
  }

  function loadAll(){
    Promise.allSettled([loadBtc(),loadFg(),loadMover()]).then(paint);
  }

  var timer=null;
  function start(){if(timer)return;timer=setInterval(loadAll,60000)}
  function stop(){if(timer){clearInterval(timer);timer=null;}}
  document.addEventListener('visibilitychange',function(){
    if(document.hidden)stop();else{loadAll();start();}
  });

  loadAll();start();
})();
</script>
</body>
</html>
