<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Clock Widget | TerminalFeed</title>
  <meta name="description" content="Live world clock showing New York, London, Tokyo, and Sydney. Embeddable widget from TerminalFeed.">
  <link rel="canonical" href="https://terminalfeed.io/embed/world-clock">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'SF Mono','Fira Code','JetBrains Mono','Consolas',monospace}
    body.theme-dark{background:#0A0A0C;color:#D4D2CB}
    body.theme-light{background:#FFF;color:#1A1A1E}
    .widget{width:100%;height:100%;padding:14px 18px;display:flex;flex-direction:column;justify-content:center;position:relative}
    .label{font-size:10px;letter-spacing:2px;opacity:0.5;margin-bottom:8px}
    .row{display:flex;justify-content:space-between;font-size:12px;line-height:1.9}
    .city{opacity:0.5}
    .time{color:#5DCAA5;font-weight:600}
    body.theme-light .time{color:#0D9488}
    .footer{position:absolute;bottom:5px;right:10px;font-size:8px;opacity:0.35}
    .footer a{color:inherit;text-decoration:none}
    .footer a:hover{opacity:1}
  </style>
</head>
<body>
  <div class="widget">
    <div class="label">WORLD CLOCKS</div>
    <div id="clocks"></div>
    <div class="footer"><a href="https://terminalfeed.io" target="_blank" rel="noopener">terminalfeed.io</a></div>
  </div>
  <script>
    var params=new URLSearchParams(window.location.search);
    document.body.className='theme-'+(params.get('theme')||'dark');
    var cities=[
      {name:'New York',tz:'America/New_York'},
      {name:'London',tz:'Europe/London'},
      {name:'Tokyo',tz:'Asia/Tokyo'},
      {name:'Sydney',tz:'Australia/Sydney'}
    ];
    function pad(n){return n<10?'0'+n:''+n}
    function update(){
      var el=document.getElementById('clocks');
      el.innerHTML='';
      cities.forEach(function(c){
        var now=new Date();
        var t=now.toLocaleTimeString('en-GB',{timeZone:c.tz,hour:'2-digit',minute:'2-digit',hour12:false});
        var div=document.createElement('div');
        div.className='row';
        div.innerHTML='<span class="city">'+c.name+'</span><span class="time">'+t+'</span>';
        el.appendChild(div);
      });
    }
    update();setInterval(update,1000);
  </script>
</body>
</html>
