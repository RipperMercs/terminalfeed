<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Briefing Widget | TerminalFeed</title>
  <meta name="description" content="One-line world briefing snapshot. Embeddable live widget from TerminalFeed.">
  <link rel="canonical" href="https://terminalfeed.io/embed/briefing">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'SF Mono','Fira Code','JetBrains Mono','Consolas',monospace}
    body.theme-dark{background:#0A0A0C;color:#D4D2CB}
    body.theme-light{background:#FFF;color:#1A1A1E}
    .widget{width:100%;height:100%;padding:14px 18px;display:flex;flex-direction:column;justify-content:center;position:relative}
    .label{font-size:10px;letter-spacing:2px;opacity:0.5;margin-bottom:6px}
    .text{font-size:12px;line-height:1.5;opacity:0.8}
    .footer{position:absolute;bottom:5px;right:10px;font-size:8px;opacity:0.35}
    .footer a{color:inherit;text-decoration:none}
    .footer a:hover{opacity:1}
    .pulse{display:inline-block;width:5px;height:5px;border-radius:50%;background:#4ADE80;margin-right:5px;animation:pulse 2s ease infinite;vertical-align:middle}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  </style>
</head>
<body>
  <div class="widget">
    <div class="label"><span class="pulse"></span>WORLD BRIEFING</div>
    <div class="text" id="brief">loading...</div>
    <div class="footer"><a href="https://terminalfeed.io" target="_blank" rel="noopener">terminalfeed.io</a></div>
  </div>
  <script>
    var params=new URLSearchParams(window.location.search);
    document.body.className='theme-'+(params.get('theme')||'dark');
    function load(){
      fetch('https://terminalfeed.io/api/briefing').then(function(r){return r.json()}).then(function(d){
        try{
          var txt=d.briefing||d.summary||d.text||d.data||'';
          if(typeof txt==='object')txt=JSON.stringify(txt);
          if(txt.length>200)txt=txt.substring(0,197)+'...';
          if(txt)document.getElementById('brief').textContent=txt;
          else document.getElementById('brief').textContent='No briefing available';
        }catch(e){document.getElementById('brief').textContent='--'}
      }).catch(function(){document.getElementById('brief').textContent='--'});
    }
    load();setInterval(load,300000);
  </script>
</body>
</html>
