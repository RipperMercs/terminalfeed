<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitcoin Ticker Embed | TerminalFeed</title>
  <meta name="description" content="Free embeddable live Bitcoin ticker. Real-time BTC/USD with 24h change. Drop onto any site.">
  <link rel="canonical" href="https://terminalfeed.io/embed/btc-ticker">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'SF Mono','Fira Code','JetBrains Mono','Consolas',monospace}
    body.theme-dark{background:#0A0A0C;color:#D4D2CB}
    body.theme-light{background:#FFF;color:#1A1A1E}
    .widget{width:100%;height:100%;padding:14px 18px;display:flex;flex-direction:column;justify-content:center;position:relative}
    .label{font-size:10px;letter-spacing:2px;opacity:0.5;margin-bottom:6px}
    .value{font-size:26px;font-weight:600;line-height:1}
    .sub{font-size:11px;margin-top:5px;opacity:0.6}
    .footer{position:absolute;bottom:5px;right:10px;font-size:8px;opacity:0.35}
    .footer a{color:inherit;text-decoration:none}
    .footer a:hover{opacity:1}
    .pulse{display:inline-block;width:5px;height:5px;border-radius:50%;background:#4ADE80;margin-right:5px;animation:pulse 2s ease infinite;vertical-align:middle}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .up{color:#4ADE80}
    .down{color:#F87171}
    body.theme-light .up{color:#16A34A}
    body.theme-light .down{color:#DC2626}
    body.theme-dark .value{color:#5DCAA5}
    body.theme-light .value{color:#0D9488}
  </style>
</head>
<body>
  <div class="widget">
    <div class="label"><span class="pulse"></span>BITCOIN TICKER / USD</div>
    <div class="value" id="price">--</div>
    <div class="sub" id="change">loading...</div>
    <div class="footer"><a href="https://terminalfeed.io/bitcoin-ticker" target="_blank" rel="noopener">terminalfeed.io</a></div>
  </div>
  <script>
    var params=new URLSearchParams(window.location.search);
    document.body.className='theme-'+(params.get('theme')||'dark');
    function fmt(n){return'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}
    function load(){
      fetch('https://terminalfeed.io/api/btc-price').then(function(r){return r.json()}).then(function(d){
        try{
          var p=d.data&&d.data.price_usd||d.price_usd||d.price;
          if(p)document.getElementById('price').textContent=fmt(p);
          var c=d.data&&d.data.change_24h_percent||d.change_24h_percent||d.change_24h||null;
          if(c!==null){
            var el=document.getElementById('change');
            var v=parseFloat(c);
            el.textContent=(v>=0?'+':'')+v.toFixed(2)+'% (24h)';
            el.className='sub '+(v>=0?'up':'down');
          }
        }catch(e){document.getElementById('price').textContent='--'}
      }).catch(function(){document.getElementById('price').textContent='--'});
    }
    load();setInterval(load,3000);
  </script>
</body>
</html>
