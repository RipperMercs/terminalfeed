<body>
<div class="container">
  <a href="/tools" class="back-link">← back to tools</a>

  <div class="page-header">
    <h1>&gt;_ TIMESTAMP CONVERTER</h1>
    <span class="badge">⚡ runs locally</span>
  </div>

  <!-- Live Clock -->
  <div class="section live-clock">
    <div class="label">Current Unix Timestamp</div>
    <div class="timestamp" id="liveSec"></div>
    <div class="millis" id="liveMs"></div>
    <div class="copy-row">
      <button class="btn" id="copyLiveBtn" onclick="copyLive()">Copy</button>
    </div>
  </div>

  <!-- Timestamp → Human -->
  <div class="section">
    <div class="section-title">Timestamp → Human Date</div>
    <div class="input-group">
      <label for="tsInput">Unix timestamp (seconds or milliseconds)</label>
      <input type="number" id="tsInput" placeholder="e.g. 1711123200" oninput="convertToHuman()">
    </div>
    <div class="quick-buttons">
      <button class="btn" onclick="setQuick(0)">Now</button>
      <button class="btn" onclick="setQuick(3600)">+1 hour</button>
      <button class="btn" onclick="setQuick(86400)">+1 day</button>
      <button class="btn" onclick="setQuick(604800)">+1 week</button>
    </div>
    <div class="result-grid" id="tsResults" style="display:none;">
      <div class="result-row">
        <span class="result-label">Local Time</span>
        <span class="result-value" id="rLocal"></span>
      </div>
      <div class="result-row">
        <span class="result-label">UTC</span>
        <span class="result-value" id="rUtc"></span>
      </div>
      <div class="result-row">
        <span class="result-label">ISO 8601</span>
        <span class="result-value" id="rIso"></span>
      </div>
      <div class="result-row">
        <span class="result-label">Relative</span>
        <span class="result-value amber" id="rRelative"></span>
      </div>
      <div class="result-row">
        <span class="result-label">Seconds</span>
        <span class="result-value green" id="rSeconds"></span>
      </div>
      <div class="result-row">
        <span class="result-label">Milliseconds</span>
        <span class="result-value green" id="rMillis"></span>
      </div>
    </div>
  </div>

  <!-- Human → Timestamp -->
  <div class="section">
    <div class="section-title">Human Date → Timestamp</div>
    <div class="date-time-row">
      <div class="input-group">
        <label for="dateInput">Date</label>
        <input type="date" id="dateInput" oninput="convertToTimestamp()">
      </div>
      <div class="input-group">
        <label for="timeInput">Time</label>
        <input type="time" id="timeInput" step="1" oninput="convertToTimestamp()">
      </div>
    </div>
    <div class="result-grid" id="dtResults" style="display:none;">
      <div class="result-row">
        <span class="result-label">Unix Timestamp (s)</span>
        <span class="result-value green" id="dSeconds"></span>
      </div>
      <div class="result-row">
        <span class="result-label">Unix Timestamp (ms)</span>
        <span class="result-value green" id="dMillis"></span>
      </div>
      <div class="result-row">
        <span class="result-label">ISO 8601</span>
        <span class="result-value" id="dIso"></span>
      </div>
    </div>

    <a href="/tools">Tools</a>
    <span class="sep">·</span>
    <a href="/">TerminalFeed.io</a>
  </div>
</div>

<script>
// Live clock
function tickClock() {
  var now = Date.now();
  document.getElementById('liveSec').textContent = Math.floor(now / 1000);
  document.getElementById('liveMs').textContent = now + ' ms';
}
tickClock();
setInterval(tickClock, 1000);

function copyLive() {
  var ts = Math.floor(Date.now() / 1000).toString();
  navigator.clipboard.writeText(ts).then(function() {
    var btn = document.getElementById('copyLiveBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

// Quick buttons
function setQuick(offset) {
  var ts = Math.floor(Date.now() / 1000) + offset;
  document.getElementById('tsInput').value = ts;
  convertToHuman();
}

// Relative time
function relativeTime(date) {
  var now = Date.now();
  var diffMs = now - date.getTime();
  var abs = Math.abs(diffMs);
  var suffix = diffMs >= 0 ? ' ago' : ' from now';

  if (abs < 60000) return Math.floor(abs / 1000) + ' seconds' + suffix;
  if (abs < 3600000) return Math.floor(abs / 60000) + ' minutes' + suffix;
  if (abs < 86400000) return Math.floor(abs / 3600000) + ' hours' + suffix;
  if (abs < 2592000000) return Math.floor(abs / 86400000) + ' days' + suffix;
  if (abs < 31536000000) return Math.floor(abs / 2592000000) + ' months' + suffix;
  return Math.floor(abs / 31536000000) + ' years' + suffix;
}

// Timestamp → Human
function convertToHuman() {
  var raw = document.getElementById('tsInput').value.trim();
  var results = document.getElementById('tsResults');
  if (!raw) { results.style.display = 'none'; return; }

  var num = parseInt(raw, 10);
  if (isNaN(num)) { results.style.display = 'none'; return; }

  // Detect ms vs s: if > 1e12, treat as milliseconds
  var ms = num > 1e12 ? num : num * 1000;
  var sec = num > 1e12 ? Math.floor(num / 1000) : num;
  var d = new Date(ms);

  if (isNaN(d.getTime())) { results.style.display = 'none'; return; }

  document.getElementById('rLocal').textContent = d.toLocaleString();
  document.getElementById('rUtc').textContent = d.toUTCString();
  document.getElementById('rIso').textContent = d.toISOString();
  document.getElementById('rRelative').textContent = relativeTime(d);
  document.getElementById('rSeconds').textContent = sec;
  document.getElementById('rMillis').textContent = ms;
  results.style.display = 'grid';
}

// Human → Timestamp
function convertToTimestamp() {
  var dateVal = document.getElementById('dateInput').value;
  var timeVal = document.getElementById('timeInput').value || '00:00:00';
  var results = document.getElementById('dtResults');

  if (!dateVal) { results.style.display = 'none'; return; }

  var d = new Date(dateVal + 'T' + timeVal);
  if (isNaN(d.getTime())) { results.style.display = 'none'; return; }

  document.getElementById('dSeconds').textContent = Math.floor(d.getTime() / 1000);
  document.getElementById('dMillis').textContent = d.getTime();
  document.getElementById('dIso').textContent = d.toISOString();
  results.style.display = 'grid';
}

// Init date input with today
(function() {
  var now = new Date();
  var y = now.getFullYear();
  var m = String(now.getMonth() + 1).padStart(2, '0');
  var day = String(now.getDate()).padStart(2, '0');
  document.getElementById('dateInput').value = y + '-' + m + '-' + day;
  var h = String(now.getHours()).padStart(2, '0');
  var min = String(now.getMinutes()).padStart(2, '0');
  var sec = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('timeInput').value = h + ':' + min + ':' + sec;
  convertToTimestamp();
})();
</script>
</body>
