  <style>

    .output .json-key { color: #60A5FA; }

<body>

  <div class="container">
    <a href="/tools" class="back">&larr; back to tools</a>

    <div class="header">
      <h1>>_ JSON FORMATTER</h1>
      <span class="badge">&#9889; runs locally</span>
    </div>

    <div class="input-section">
      <textarea id="jsonInput" placeholder="Paste your JSON here..." spellcheck="false"></textarea>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="formatJSON()" title="Ctrl+Enter">Format</button>
      <button class="btn" onclick="minifyJSON()">Minify</button>
      <button class="btn" onclick="validateJSON()">Validate</button>
      <button class="btn" onclick="copyOutput()">Copy</button>
      <button class="btn" onclick="clearAll()">Clear</button>
      <span class="shortcut-hint">Ctrl+Enter to format</span>
    </div>

    <div class="output-section">
      <div class="output-label">Output</div>
      <div class="output" id="jsonOutput"></div>
    </div>

    <div class="status-bar" id="statusBar">
      <span class="status-item" id="statusValidity">--</span>
      <span class="status-item" id="statusChars">0 chars</span>
      <span class="status-item" id="statusLines">0 lines</span>
      <span class="status-item" id="statusDepth">depth: 0</span>
    </div>
  </div>

  <footer class="footer">
    <a href="/tools">&larr; All Tools</a>
    <span class="sep">|</span>
    <a href="/">TerminalFeed Home</a>
    <span class="sep">|</span>
    <span>&copy; TerminalFeed.io</span>
  </footer>

  <script>
    const input = document.getElementById('jsonInput');
    const output = document.getElementById('jsonOutput');
    const statusValidity = document.getElementById('statusValidity');
    const statusChars = document.getElementById('statusChars');
    const statusLines = document.getElementById('statusLines');
    const statusDepth = document.getElementById('statusDepth');

    let lastFormattedText = '';

    // Keyboard shortcut
    document.addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        formatJSON();
      }
    });

    // Update char/line count on input
    input.addEventListener('input', updateInputStats);

    function updateInputStats() {
      const val = input.value;
      statusChars.textContent = val.length + ' chars';
      statusLines.textContent = (val ? val.split('\n').length : 0) + ' lines';
    }

    function getMaxDepth(obj, current) {
      current = current || 0;
      if (obj === null || typeof obj !== 'object') return current;
      let max = current + 1;
      if (Array.isArray(obj)) {
        for (let i = 0; i < obj.length; i++) {
          const d = getMaxDepth(obj[i], current + 1);
          if (d > max) max = d;
        }
      } else {
        const keys = Object.keys(obj);
        for (let i = 0; i < keys.length; i++) {
          const d = getMaxDepth(obj[keys[i]], current + 1);
          if (d > max) max = d;
        }
      }
      return max;
    }

    function escapeHTML(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function syntaxHighlight(json) {
      // Tokenize the formatted JSON string and wrap in spans
      // We process character by character to handle all cases
      let result = '';
      let i = 0;
      const len = json.length;

      while (i < len) {
        const ch = json[i];

        // Whitespace — pass through
        if (ch === ' ' || ch === '\n' || ch === '\r' || ch === '\t') {
          result += ch;
          i++;
          continue;
        }

        // Brackets and braces
        if (ch === '{' || ch === '}' || ch === '[' || ch === ']') {
          result += '<span class="json-bracket">' + ch + '</span>';
          i++;
          continue;
        }

        // Comma
        if (ch === ',') {
          result += '<span class="json-comma">,</span>';
          i++;
          continue;
        }

        // Colon
        if (ch === ':') {
          result += '<span class="json-colon">:</span>';
          i++;
          continue;
        }

        // String
        if (ch === '"') {
          let str = '"';
          i++;
          while (i < len) {
            const c = json[i];
            str += c;
            if (c === '\\') {
              i++;
              if (i < len) {
                str += json[i];
                i++;
              }
              continue;
            }
            if (c === '"') {
              i++;
              break;
            }
            i++;
          }

          const escaped = escapeHTML(str);

          // Determine if this string is a key (followed by colon)
          let j = i;
          while (j < len && (json[j] === ' ' || json[j] === '\t')) j++;
          if (j < len && json[j] === ':') {
            result += '<span class="json-key">' + escaped + '</span>';
          } else {
            result += '<span class="json-string">' + escaped + '</span>';
          }
          continue;
        }

        // Numbers
        if (ch === '-' || (ch >= '0' && ch <= '9')) {
          let num = '';
          while (i < len && /[0-9eE.+\-]/.test(json[i])) {
            num += json[i];
            i++;
          }
          result += '<span class="json-number">' + escapeHTML(num) + '</span>';
          continue;
        }

        // true
        if (json.substr(i, 4) === 'true') {
          result += '<span class="json-bool">true</span>';
          i += 4;
          continue;
        }

        // false
        if (json.substr(i, 5) === 'false') {
          result += '<span class="json-bool">false</span>';
          i += 5;
          continue;
        }

        // null
        if (json.substr(i, 4) === 'null') {
          result += '<span class="json-null">null</span>';
          i += 4;
          continue;
        }

        // Fallback
        result += escapeHTML(ch);
        i++;
      }

      return result;
    }

    function parseError(e, raw) {
      // Try to extract position info from the error message
      let msg = e.message;
      // Most browsers: "... at position 123" or "... at line X column Y"
      const posMatch = msg.match(/position\s+(\d+)/i);
      const lineColMatch = msg.match(/line\s+(\d+)\s+column\s+(\d+)/i);

      let detail = '';
      if (lineColMatch) {
        detail = ' (line ' + lineColMatch[1] + ', column ' + lineColMatch[2] + ')';
      } else if (posMatch) {
        const pos = parseInt(posMatch[1], 10);
        // Calculate line and column from position
        let line = 1, col = 1;
        for (let i = 0; i < pos && i < raw.length; i++) {
          if (raw[i] === '\n') { line++; col = 1; } else { col++; }
        }
        detail = ' (line ' + line + ', column ' + col + ', position ' + pos + ')';
      }

      return msg + detail;
    }

    function formatJSON() {
      const raw = input.value.trim();
      if (!raw) {
        output.innerHTML = '<span class="error-msg">No input provided.</span>';
        statusValidity.textContent = '--';
        statusValidity.className = 'status-item';
        statusDepth.textContent = 'depth: 0';
        return;
      }
      try {
        const parsed = JSON.parse(raw);
        const formatted = JSON.stringify(parsed, null, 2);
        lastFormattedText = formatted;
        output.innerHTML = syntaxHighlight(formatted);
        statusValidity.textContent = 'valid';
        statusValidity.className = 'status-item status-valid';
        statusDepth.textContent = 'depth: ' + getMaxDepth(parsed);
        updateInputStats();
      } catch (e) {
        output.innerHTML = '<span class="error-msg">Invalid JSON\n\n' + escapeHTML(parseError(e, raw)) + '</span>';
        statusValidity.textContent = 'invalid';
        statusValidity.className = 'status-item status-invalid';
        lastFormattedText = '';
      }
    }

    function minifyJSON() {
      const raw = input.value.trim();
      if (!raw) {
        output.innerHTML = '<span class="error-msg">No input provided.</span>';
        return;
      }
      try {
        const parsed = JSON.parse(raw);
        const minified = JSON.stringify(parsed);
        lastFormattedText = minified;
        output.innerHTML = syntaxHighlight(minified);
        statusValidity.textContent = 'valid';
        statusValidity.className = 'status-item status-valid';
        statusDepth.textContent = 'depth: ' + getMaxDepth(parsed);
        updateInputStats();
      } catch (e) {
        output.innerHTML = '<span class="error-msg">Invalid JSON\n\n' + escapeHTML(parseError(e, raw)) + '</span>';
        statusValidity.textContent = 'invalid';
        statusValidity.className = 'status-item status-invalid';
        lastFormattedText = '';
      }
    }

    function validateJSON() {
      const raw = input.value.trim();
      if (!raw) {
        output.innerHTML = '<span class="error-msg">No input provided.</span>';
        statusValidity.textContent = '--';
        statusValidity.className = 'status-item';
        return;
      }
      try {
        const parsed = JSON.parse(raw);
        const depth = getMaxDepth(parsed);
        let entryCount = 0;
        if (Array.isArray(parsed)) {
          entryCount = parsed.length;
        } else if (typeof parsed === 'object' && parsed !== null) {
          entryCount = Object.keys(parsed).length;
        }
        output.innerHTML = '<span class="status-valid">Valid JSON</span>\n\n'
          + 'Type: ' + (Array.isArray(parsed) ? 'Array' : typeof parsed) + '\n'
          + 'Top-level entries: ' + entryCount + '\n'
          + 'Max nesting depth: ' + depth + '\n'
          + 'Minified size: ' + JSON.stringify(parsed).length + ' chars';
        statusValidity.textContent = 'valid';
        statusValidity.className = 'status-item status-valid';
        statusDepth.textContent = 'depth: ' + depth;
        updateInputStats();
      } catch (e) {
        output.innerHTML = '<span class="error-msg">Invalid JSON\n\n' + escapeHTML(parseError(e, raw)) + '</span>';
        statusValidity.textContent = 'invalid';
        statusValidity.className = 'status-item status-invalid';
      }
    }

    function copyOutput() {
      if (!lastFormattedText) {
        // Try to copy the raw text content of output
        const text = output.textContent;
        if (text) {
          navigator.clipboard.writeText(text);
        }
        return;
      }
      navigator.clipboard.writeText(lastFormattedText).then(function() {
        const btn = document.querySelectorAll('.btn')[3];
        const original = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(function() { btn.textContent = original; }, 1200);
      });
    }

    function clearAll() {
      input.value = '';
      output.innerHTML = '';
      lastFormattedText = '';
      statusValidity.textContent = '--';
      statusValidity.className = 'status-item';
      statusChars.textContent = '0 chars';
      statusLines.textContent = '0 lines';
      statusDepth.textContent = 'depth: 0';
      input.focus();
    }
  </script>

</body>
