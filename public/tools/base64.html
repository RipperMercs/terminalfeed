<body>
<div class="back-link"><a href="/tools">&larr; back to tools</a></div>
<div class="container">
  <div class="header">

    <span class="badge">&#9889; runs locally</span>
  </div>

  <div class="live-toggle">
    <input type="checkbox" id="liveMode" checked>
    <label for="liveMode">Live mode (encode/decode as you type)</label>
  </div>

  <div class="workspace">
    <div class="panel">
      <label for="inputArea">Input</label>
      <textarea id="inputArea" placeholder="Type or paste text here..."></textarea>
      <div class="char-count"><span id="inputCount">0</span> chars</div>
    </div>

    <div class="controls-col">
      <button id="btnEncode">Encode &rarr;</button>
      <button id="btnDecode">&larr; Decode</button>
      <button class="btn-copy" id="btnCopy">Copy Output</button>
    </div>

    <div class="panel">
      <label for="outputArea">Output</label>
      <textarea id="outputArea" placeholder="Result appears here..." readonly></textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span class="error-msg" id="errorMsg"></span>
        <span class="char-count"><span id="outputCount">0</span> chars</span>
      </div>
    </div>
  </div>
</div>

  <a href="/">TerminalFeed.io</a>
</footer>

<script>
(function() {
  const inputArea = document.getElementById('inputArea');
  const outputArea = document.getElementById('outputArea');
  const inputCount = document.getElementById('inputCount');
  const outputCount = document.getElementById('outputCount');
  const errorMsg = document.getElementById('errorMsg');
  const liveMode = document.getElementById('liveMode');
  let lastDirection = 'encode';

  function utf8ToBase64(str) {
    const bytes = new TextEncoder().encode(str);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
  }

  function base64ToUtf8(b64) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder().decode(bytes);
  }

  function encode() {
    lastDirection = 'encode';
    errorMsg.textContent = '';
    outputArea.classList.remove('error');
    try {
      outputArea.value = utf8ToBase64(inputArea.value);
    } catch (e) {
      errorMsg.textContent = 'Encoding error: ' + e.message;
      outputArea.classList.add('error');
    }
    updateCounts();
  }

  function decode() {
    lastDirection = 'decode';
    errorMsg.textContent = '';
    outputArea.classList.remove('error');
    const val = inputArea.value.trim();
    if (!val) { outputArea.value = ''; updateCounts(); return; }
    try {
      outputArea.value = base64ToUtf8(val);
    } catch (e) {
      errorMsg.textContent = 'Invalid Base64 input';
      outputArea.classList.add('error');
      outputArea.value = '';
    }
    updateCounts();
  }

  function updateCounts() {
    inputCount.textContent = inputArea.value.length;
    outputCount.textContent = outputArea.value.length;
  }

  document.getElementById('btnEncode').addEventListener('click', encode);
  document.getElementById('btnDecode').addEventListener('click', decode);

  inputArea.addEventListener('input', function() {
    if (!liveMode.checked) { updateCounts(); return; }
    if (lastDirection === 'decode') decode(); else encode();
  });

  document.getElementById('btnCopy').addEventListener('click', function() {
    if (!outputArea.value) return;
    navigator.clipboard.writeText(outputArea.value).then(function() {
      var btn = document.getElementById('btnCopy');
      btn.textContent = 'Copied!';
      setTimeout(function() { btn.textContent = 'Copy Output'; }, 1500);
    });
  });

  updateCounts();
})();
</script>
