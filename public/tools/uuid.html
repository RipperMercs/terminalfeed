<body>
<div class="back-link"><a href="/tools">&larr; back to tools</a></div>
<div class="container">
  <div class="header">
    <h1><span>&gt;_</span> UUID GENERATOR</h1>
    <span class="badge">&#9889; runs locally</span>
  </div>

  <div class="single-uuid" id="singleDisplay" title="Click to copy">
    <div class="uuid-text" id="mainUuid"></div>
    <div class="hint">click to copy</div>
    <div class="copied-toast" id="mainToast">Copied!</div>
  </div>

  <div class="actions">
    <button class="btn-primary" id="btnGenerate">Generate</button>
    <button id="btnCopy">Copy</button>
  </div>

  <div class="options">
    <label><input type="checkbox" id="optUppercase"> Uppercase</label>
    <label><input type="checkbox" id="optNoHyphens"> Without hyphens</label>
  </div>

  <div class="session-count">Generated this session: <strong id="sessionCount">0</strong></div>

  <div class="bulk-section">
    <div class="bulk-header">
      <span>Generate</span>
      <input type="number" id="bulkCount" value="5" min="1" max="500">
      <span>UUIDs</span>
      <button id="btnBulkGenerate">Generate Bulk</button>
    </div>
    <div class="bulk-list" id="bulkList"></div>
    <div class="bulk-actions">
      <button id="btnCopyAll" style="display:none;">Copy All</button>
    </div>
  </div>
</div>

<footer>
  <a href="/tools">Tools</a>
  <a href="/">TerminalFeed.io</a>
</footer>

<script>
(function() {
  var sessionCount = 0;
  var bulkUuids = [];

  function formatUuid(raw) {
    var u = raw;
    if (document.getElementById('optNoHyphens').checked) u = u.replace(/-/g, '');
    if (document.getElementById('optUppercase').checked) u = u.toUpperCase();
    return u;
  }

  function generateOne() {
    sessionCount++;
    document.getElementById('sessionCount').textContent = sessionCount;
    return formatUuid(crypto.randomUUID());
  }

  function showMain() {
    var uuid = generateOne();
    document.getElementById('mainUuid').textContent = uuid;
  }

  function flashToast(el) {
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 1200);
  }

  function copyText(text, toastEl) {
    navigator.clipboard.writeText(text).then(function() {
      if (toastEl) flashToast(toastEl);
    });
  }

  // Single UUID
  document.getElementById('btnGenerate').addEventListener('click', showMain);

  document.getElementById('singleDisplay').addEventListener('click', function() {
    var text = document.getElementById('mainUuid').textContent;
    if (text) copyText(text, document.getElementById('mainToast'));
  });

  document.getElementById('btnCopy').addEventListener('click', function() {
    var text = document.getElementById('mainUuid').textContent;
    if (text) {
      var btn = this;
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = 'Copied!';
        setTimeout(function() { btn.textContent = 'Copy'; }, 1200);
      });
    }
  });

  // Bulk
  function renderBulk() {
    var list = document.getElementById('bulkList');
    list.innerHTML = '';
    bulkUuids.forEach(function(u, i) {
      var row = document.createElement('div');
      row.className = 'uuid-row';
      row.innerHTML = '<span>' + u + '</span><span class="row-copied">Copied!</span>';
      row.addEventListener('click', function() {
        copyText(u, row.querySelector('.row-copied'));
      });
      list.appendChild(row);
    });
    document.getElementById('btnCopyAll').style.display = bulkUuids.length ? '' : 'none';
  }

  document.getElementById('btnBulkGenerate').addEventListener('click', function() {
    var count = parseInt(document.getElementById('bulkCount').value, 10);
    if (isNaN(count) || count < 1) count = 1;
    if (count > 500) count = 500;
    bulkUuids = [];
    for (var i = 0; i < count; i++) bulkUuids.push(generateOne());
    renderBulk();
  });

  document.getElementById('btnCopyAll').addEventListener('click', function() {
    var btn = this;
    navigator.clipboard.writeText(bulkUuids.join('\n')).then(function() {
      btn.textContent = 'Copied All!';
      setTimeout(function() { btn.textContent = 'Copy All'; }, 1200);
    });
  });

  // Re-format when options change
  document.getElementById('optUppercase').addEventListener('change', function() {
    var main = document.getElementById('mainUuid').textContent;
    if (main) showMain();
    if (bulkUuids.length) {
      bulkUuids = bulkUuids.map(function() { return formatUuid(crypto.randomUUID()); });
      sessionCount += bulkUuids.length;
      document.getElementById('sessionCount').textContent = sessionCount;
      renderBulk();
    }
  });
  document.getElementById('optNoHyphens').addEventListener('change', function() {
    var main = document.getElementById('mainUuid').textContent;
    if (main) showMain();
    if (bulkUuids.length) {
      bulkUuids = bulkUuids.map(function() { return formatUuid(crypto.randomUUID()); });
      sessionCount += bulkUuids.length;
      document.getElementById('sessionCount').textContent = sessionCount;
      renderBulk();
    }
  });

  // Generate initial UUID on load
  showMain();
})();
</script>
</body>
