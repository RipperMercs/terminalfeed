name = "terminalfeed-api"
main = "worker.js"
compatibility_date = "2024-09-25"

# Cloudflare Workers Observability. Mirrors the TensorFeed configuration
# so the federation perimeter is observable from one query surface.
# Captures structured request logs + console output for query via the
# Workers Observability API.
[observability]
enabled = true
head_sampling_rate = 1.0

routes = [
  { pattern = "terminalfeed.io/api/*", zone_name = "terminalfeed.io" }
]

[[kv_namespaces]]
binding = "WEBHOOK_SUBS"
id = "285e370fcf3c475fb63d7d45d5ee139c"

[[analytics_engine_datasets]]
binding = "AGENT_ANALYTICS"
dataset = "agent_traffic"

[triggers]
crons = ["*/5 * * * *"]
