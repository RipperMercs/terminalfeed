<!-- TerminalFeed Newsletter Signup Embed Snippet -->
<!-- Instructions: Copy and paste this entire block into your page footer or where you want the signup to appear -->
<div id="tf-newsletter-embed" style="background: #111114; border: 1px solid #1E1E24; border-radius: 8px; padding: 16px; margin: 20px 0; max-width: 100%;">
  <style>
    #tf-newsletter-embed { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace; }
    #tf-newsletter-embed * { margin: 0; padding: 0; box-sizing: border-box; }
    #tf-newsletter-embed h3 { font-size: 12px; color: #5DCAA5; margin-bottom: 8px; letter-spacing: 1px; font-weight: 400; text-transform: uppercase; }
    #tf-newsletter-embed p { font-size: 11px; color: #8A8880; margin-bottom: 12px; line-height: 1.5; }
    #tf-newsletter-embed form { display: flex; gap: 8px; flex-direction: column; }
    @media (min-width: 500px) {
      #tf-newsletter-embed form { flex-direction: row; gap: 6px; }
    }
    #tf-newsletter-embed input {
      flex: 1;
      background: #0D0D10;
      border: 1px solid #1E1E24;
      color: #F0EDE6;
      padding: 10px 12px;
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
      font-size: 12px;
      border-radius: 4px;
      transition: border-color 0.2s ease;
    }
    #tf-newsletter-embed input:focus { outline: none; border-color: #5DCAA5; }
    #tf-newsletter-embed input::placeholder { color: #4E4D49; }
    #tf-newsletter-embed button {
      background: #5DCAA5;
      color: #0A0A0C;
      border: none;
      padding: 10px 20px;
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
      font-size: 11px;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    #tf-newsletter-embed button:hover { background: #4BB895; }
    #tf-newsletter-embed button:active { transform: scale(0.98); }
    #tf-newsletter-embed button:disabled { background: #4E4D49; cursor: not-allowed; opacity: 0.6; }
    #tf-newsletter-embed .tf-embed-message {
      font-size: 11px;
      padding: 8px;
      border-radius: 4px;
      margin-top: 8px;
      display: none;
    }
    #tf-newsletter-embed .tf-embed-message.success {
      background: #4ADE8015;
      color: #4ADE80;
      border: 1px solid #4ADE8040;
      display: block;
    }
    #tf-newsletter-embed .tf-embed-message.error {
      background: #F8717115;
      color: #F87171;
      border: 1px solid #F8717140;
      display: block;
    }
  </style>

  <h3>Daily Terminal Briefing</h3>
  <p>BTC, markets, earthquakes, top news. Free. Every morning at 9 AM ET.</p>
  <form id="tf-embed-form">
    <input
      type="email"
      id="tf-embed-email"
      placeholder="your@email.com"
      required
      aria-label="Email address"
    >
    <button type="submit" id="tf-embed-submit">Subscribe</button>
    <div class="tf-embed-message" id="tf-embed-message"></div>
  </form>
</div>

<script>
(function() {
  const form = document.getElementById('tf-embed-form');
  const emailInput = document.getElementById('tf-embed-email');
  const submitBtn = document.getElementById('tf-embed-submit');
  const message = document.getElementById('tf-embed-message');

  if (!form || !emailInput || !submitBtn || !message) return; // Safety check

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = emailInput.value.trim();
    if (!email) return;

    submitBtn.disabled = true;
    const originalText = submitBtn.textContent;
    submitBtn.textContent = 'Subscribing...';
    message.className = 'tf-embed-message';

    try {
      // Try to POST to the backend
      const response = await fetch('/api/newsletter-signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });

      // Store email locally regardless of API response
      const subscribers = JSON.parse(localStorage.getItem('tf_newsletter_subscribers') || '[]');
      if (!subscribers.includes(email)) {
        subscribers.push(email);
        localStorage.setItem('tf_newsletter_subscribers', JSON.stringify(subscribers));
      }

      // Show success message
      message.textContent = "You're in. First briefing tomorrow at 9 AM ET.";
      message.className = 'tf-embed-message success';
      emailInput.value = '';
      submitBtn.textContent = originalText;
      submitBtn.disabled = false;

    } catch (error) {
      // Still show success and store locally
      const subscribers = JSON.parse(localStorage.getItem('tf_newsletter_subscribers') || '[]');
      if (!subscribers.includes(email)) {
        subscribers.push(email);
        localStorage.setItem('tf_newsletter_subscribers', JSON.stringify(subscribers));
      }

      message.textContent = "You're in. First briefing tomorrow at 9 AM ET.";
      message.className = 'tf-embed-message success';
      emailInput.value = '';
      submitBtn.textContent = originalText;
      submitBtn.disabled = false;
    }
  });

  // Validate email format on input
  emailInput.addEventListener('input', (e) => {
    const isValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e.target.value);
    submitBtn.disabled = !isValid;
  });

  // Initialize: disable submit button until valid email
  submitBtn.disabled = true;
})();
</script>
